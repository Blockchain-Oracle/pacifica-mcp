<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 260" role="img" aria-label="Pacifica MCP — AI-Powered Trading on Solana">
  <title>Pacifica MCP — AI-Powered Trading on Solana</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="260" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g fill="#ffffff" fill-opacity="0.05">
    <circle cx="20" cy="20" r="1.2"/><circle cx="60" cy="20" r="1.2"/><circle cx="100" cy="20" r="1.2"/><circle cx="140" cy="20" r="1.2"/>
    <circle cx="20" cy="60" r="1.2"/><circle cx="60" cy="60" r="1.2"/><circle cx="100" cy="60" r="1.2"/>
    <circle cx="20" cy="240" r="1.2"/><circle cx="60" cy="240" r="1.2"/><circle cx="100" cy="240" r="1.2"/><circle cx="140" cy="240" r="1.2"/>
    <circle cx="1260" cy="20" r="1.2"/><circle cx="1300" cy="20" r="1.2"/><circle cx="1340" cy="20" r="1.2"/><circle cx="1380" cy="20" r="1.2"/>
    <circle cx="1260" cy="240" r="1.2"/><circle cx="1300" cy="240" r="1.2"/><circle cx="1340" cy="240" r="1.2"/><circle cx="1380" cy="240" r="1.2"/>
  </g>

  <!-- Logo (left) — hexagon + wave from brand -->
  <svg x="44" y="28" width="72" height="72" viewBox="0 0 512 512" fill="none">
    <rect width="512" height="512" rx="96" fill="#0a0a0a" stroke="#22d3ee" stroke-width="20"/>
    <polygon points="256,64 416,156 416,340 256,432 96,340 96,156" stroke="#22d3ee" stroke-width="24" fill="none"/>
    <path d="M128 256 Q192 160 256 256 Q320 352 384 256" stroke="#22d3ee" stroke-width="28" stroke-linecap="round" fill="none"/>
    <circle cx="128" cy="256" r="28" fill="#22d3ee"/>
    <circle cx="384" cy="256" r="28" fill="#22d3ee"/>
  </svg>

  <!-- Wordmark + tagline -->
  <text x="130" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#fafafa" letter-spacing="-1.5">Pacifica MCP</text>
  <line x1="130" y1="94" x2="370" y2="94" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <text x="130" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0" letter-spacing="-0.2">Give AI agents the power to trade perpetuals on Solana</text>
  <text x="130" y="156" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="400" fill="#71717a">36 tools · Market data · Order execution · WebSocket streaming · Subaccounts</text>
  <text x="130" y="175" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="400" fill="#71717a">MCP server · Standalone CLI · Agent Skill · 12+ AI hosts supported</text>

  <!-- Badge row -->
  <rect x="130" y="195" width="72" height="22" rx="4" fill="#042f2e" stroke="rgba(34,211,238,0.35)" stroke-width="1"/>
  <text x="166" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" font-weight="700" fill="#22d3ee">36 Tools</text>

  <rect x="210" y="195" width="80" height="22" rx="4" fill="#0f172a" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="250" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" font-weight="700" fill="#67e8f9">Solana</text>

  <rect x="298" y="195" width="84" height="22" rx="4" fill="#042f2e" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="340" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" font-weight="700" fill="#22d3ee">Ed25519</text>

  <rect x="390" y="195" width="100" height="22" rx="4" fill="#0d1f0d" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="440" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" font-weight="700" fill="#4ade80">MCP · CLI · npm</text>

  <rect x="498" y="195" width="90" height="22" rx="4" fill="#1a1a2e" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="543" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" font-weight="700" fill="#67e8f9">WebSocket</text>

  <!-- Right side: trading flow visual -->
  <line x1="1060" y1="20" x2="1060" y2="240" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <g transform="translate(1100, 30)">
    <circle cx="140" cy="30" r="36" fill="url(#nodeGlow)"/>

    <!-- Agent node -->
    <circle cx="140" cy="30" r="20" fill="#111111" stroke="#22d3ee" stroke-width="2"/>
    <text x="140" y="27" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8.5" font-weight="700" fill="#22d3ee">AI</text>
    <text x="140" y="39" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8.5" font-weight="700" fill="#22d3ee">Agent</text>

    <!-- MCP node -->
    <circle cx="60" cy="110" r="16" fill="#111111" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="60" y="114" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7.5" fill="#22d3ee">MCP</text>

    <!-- Pacifica node -->
    <circle cx="220" cy="110" r="16" fill="#111111" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="220" y="114" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#22d3ee">Pacifica</text>

    <!-- Result nodes -->
    <circle cx="30" cy="185" r="13" fill="#0e1a1a" stroke="#164e63" stroke-width="1"/>
    <text x="30" y="189" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#22d3ee">data</text>

    <circle cx="100" cy="185" r="13" fill="#0e1a1a" stroke="#164e63" stroke-width="1"/>
    <text x="100" y="189" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#22d3ee">trade</text>

    <circle cx="180" cy="185" r="16" fill="#042f2e" stroke="#22d3ee" stroke-width="2.5"/>
    <text x="180" y="189" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7.5" font-weight="700" fill="#67e8f9">profit</text>

    <circle cx="250" cy="185" r="13" fill="#0e1a1a" stroke="#164e63" stroke-width="1"/>
    <text x="250" y="189" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#22d3ee">stream</text>

    <!-- Edges -->
    <line x1="140" y1="50" x2="60" y2="94" stroke="#164e63" stroke-width="1" opacity="0.6"/>
    <line x1="140" y1="50" x2="220" y2="94" stroke="#164e63" stroke-width="1" opacity="0.6"/>
    <line x1="60" y1="126" x2="30" y2="172" stroke="#164e63" stroke-width="1" opacity="0.6"/>
    <line x1="60" y1="126" x2="100" y2="172" stroke="#164e63" stroke-width="1" opacity="0.6"/>
    <line x1="220" y1="126" x2="250" y2="172" stroke="#164e63" stroke-width="1" opacity="0.6"/>

    <!-- Highlighted path -->
    <line x1="140" y1="50" x2="220" y2="94" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5 3" opacity="0.9"/>
    <line x1="220" y1="126" x2="180" y2="169" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5 3" opacity="0.9"/>

    <text x="245" y="150" font-family="ui-monospace, monospace" font-size="8" fill="#22d3ee" opacity="0.7">trade</text>
    <text x="245" y="161" font-family="ui-monospace, monospace" font-size="8" fill="#22d3ee" opacity="0.7">flow</text>
  </g>
</svg>
